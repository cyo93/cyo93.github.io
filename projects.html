<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<Title>Projects - Chad Young</Title>
<link rel="stylesheet" href="pagestyle.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<script src="menu.js" defer></script>
<style>
h2 { text-align: center; }

.project-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
	grid-auto-rows: 1fr;
	gap: 20px;
	padding: 12px 0;
}
.project-card {
	background-color: #001A6F;
	border: 2px solid #001A6F;
	border-radius: 6px;
	text-align: center;
	transition: background-color 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
}
.project-card:hover {
	background-color: #ffe600;
	border-color: #ffe600;
	transform: translateY(-3px);
}
.project-card:hover .card-link {
	color: #000;
}
/* card-link fills the entire card so every pixel is clickable */
.card-link {
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: flex-start;
	height: 100%;
	padding: 20px;
	text-decoration: none;
	font-family: "Michroma", sans-serif;
	font-size: clamp(14px, 1.8vw, 20px);
	color: #fff;
	transition: color 0.25s ease;
	letter-spacing: 1px;
	box-sizing: border-box;
}
/* fixed-height image box keeps all cards the same proportion */
.card-link .img-box {
	width: 100%;
	height: 180px;
	display: flex;
	align-items: center;
	justify-content: center;
	margin-bottom: 14px;
	overflow: hidden;
	border-radius: 4px;
}
.card-link .img-box img {
	width: 100%;
	height: 100%;
	object-fit: cover;
	object-position: center;
	border-radius: 4px;
	display: block;
}
</style>
</head>
<body>
<div id="menu"></div>
<h2>Personal Projects</h2>

<div class="project-grid">
	<div class="project-card"><a href="gam231.html" class="card-link"><div class="img-box"><img src="gam231project.png" alt="GAM231 Final Project"></div>GAM231 Final Project</a></div>
	<div class="project-card"><a href="goober.html" class="card-link"><div class="img-box"><img src="goober.png" alt="Goober"></div>Goober</a></div>
	<div class="project-card"><a href="graybox.html" class="card-link"><div class="img-box"><img src="graybox.png" alt="GrayBox"></div>GrayBox</a></div>
	<div class="project-card"><a href="ninja.html" class="card-link"><div class="img-box"><img src="ninja.png" alt="Fruit Ninja Remake"></div>Fruit Ninja Remake</a></div>
	<div class="project-card"><a href="oublivious.html" class="card-link"><div class="img-box"><img src="oubliviousmenu.png" alt="Oublivious"></div>Oublivious</a></div>
	<div class="project-card"><a href="tr.html" class="card-link"><div class="img-box"><img src="tr.png" alt="Return of the Tomb Raider"></div>Return of the Tomb Raider</a></div>
	<div class="project-card"><a href="bookcraft.html" class="card-link"><div class="img-box"><img src="bookcraft.png" alt="Project Bookcraft"></div>Project Bookcraft</a></div>
	<div class="project-card"><a href="isobreaker.html" class="card-link"><div class="img-box"><img src="cd.png" alt="ISOBreaker"></div>ISOBreaker <span style="font-size:12px;color:#ffe600;">NEW</span></a></div>
</div>
</body>
</html>

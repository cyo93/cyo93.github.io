<style>
.hero {
	text-align: center;
	padding: 40px 0 20px;
}
.hero h1 {
	font-size: clamp(32px, 6vw, 52px);
	margin-bottom: 12px;
}
.hero p {
	max-width: 100%;
	margin: 0 auto 24px;
	font-size: clamp(15px, 2vw, 18px);
}
.hero-img {
	max-width: min(500px, 90%);

	border-radius: 6px;

	margin: 0 auto 32px;
	transition: border-color 0.25s;
}
.hero-img:hover {

}
.links-row {
	display: flex;
	flex-wrap: wrap;
	justify-content: center;
	gap: 12px;
	margin: 24px 0;
}
.links-row a h2 {
	font-size: clamp(14px, 2.2vw, 22px);

	border: 1px solid #001A6F;
	border-radius: 4px;
	transition: color 0.25s, border-color 0.25s;
}
.links-row a h2:hover {
	color: #ffe600;
	border-color: #ffe600;
}
.social-row {
	list-style: none;
	display: flex;
	flex-wrap: wrap;
	justify-content: center;
	gap: 12px;
	padding: 0;
	margin: 0 0 40px;
}
.social-row li a h2 {
	font-size: clamp(13px, 2vw, 20px);
	padding: 8px 16px;
	border: 1px solid #001A6F;
	border-radius: 4px;
	transition: color 0.25s, border-color 0.25s;
}
.social-row li a h2:hover {
	color: #ffe600;
	border-color: #ffe600;
}
.demo-section {
	text-align: center;
	margin-top: 32px;
}
.demo-section h1 {
	margin-bottom: 20px;
}
